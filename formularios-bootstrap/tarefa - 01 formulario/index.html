<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Tarefa Formulário</title>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center m-4">
            <div class="col-6">
                <h1>Cadastro de Produtos</h1>
                <form >
                    <div class="mb-4">
                        <label for="title" class="form-label">Título</label>
                        <input type="text" class="form-control" placeholder="Informe o título do produto">
                    </div>
                    <div class="mb-4">
                        <label for="descricao" class="form-label">Título</label>
                        <textarea name="descricao" id="descricao" class="form-control" rows="3" placeholder="Descreva esse produto"></textarea>
                    </div>
                    <div class="mb-4">
                        <label for="categoria" class="form-label">Selecione a Categoria</label>
                        <select name="categoria" id="categoria" class="form-control">
                            <option value="1">categoria A</option>
                            <option value="1">categoria B</option>
                            <option value="1">categoria C</option>
                            <option value="1">categoria D</option>
                            <option value="1">categoria F</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <input type="checkbox" class="form-check-input" >
                        <label for="">Está em estoque?</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                </form>
            </div>

        </div>
    </div>
    
</body>
</html>
