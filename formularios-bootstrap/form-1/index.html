<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Formulário - 01</title>
</head>


<!-- criando um formulário -->
<body>
    <div class="container vh-100 justify-content-center align-content-center">
        <div class="row">
            <div class="col-6 m4">
            <img src="img/neve.jpg" alt="" class="img-fluid">    
            </div>
            <div class="col-6 m4">
                <form action="">
                    <div class="mb-4">
                        <label for="email" class="form-label">E-mail:</label>
                        <input type="email" class="form-control" id="email" name="email" aria-describedby="emailHelp" placeholder="Informe o seu email">
                        <div class="form-text" id="emailHelp">Não compartilhamos o seu endereço de email</div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Senha:</label>
                        <input type="password" class="form-control" name="password" id="password" placeholder="Informe a sua senha">
                    </div>
                    <input type="submit" class="btn btn-primary" value="Cadastrar">
                </form>  
            </div>
        </div>
    </div>
</body>
</html>
