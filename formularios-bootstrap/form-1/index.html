<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Formulário - 01</title>
</head>


<!-- criando um formulário -->
<body>
    <div class="container vh-100 justify-content-center align-content-center">
        <div class="row">
            <div class="col-6 m4">
            <img src="img/neve.jpg" alt="" class="img-fluid">    
            </div>
            <div class="col-6 m4">
                <form action="">
                    <div class="mb-4">
                        <label for="email" class="form-label">E-mail:</label>
                        <input type="email" class="form-control" id="email" name="email" aria-describedby="emailHelp" placeholder="Informe o seu email">
                        <div class="form-text" id="emailHelp">Não compartilhamos o seu endereço de email</div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Senha:</label>
                        <input type="password" class="form-control" name="password" id="password" placeholder="Informe a sua senha">
                    </div>
                    <div class="mb-4">
                        <label for="foto" class="form-label">Apenas um arquivo</label>
                        <input type="file" class="form-control">
                    </div>
                    <div class="mb-4">
                        <label for="foto" class="form-label">Apenas um arquivo</label>
                        <input type="file" class="form-control" multiple>
                    </div>
                    <div class="mb-4">
                        <label for="cidades" class="form-label">Selecione uma cidade</label>
                        <input type="text" class="form-control" list="datalistOptions" id="cidade" placeholder="Busque a sua cidade...">
                        <datalist id="datalistOptions">
                            <option value="São Paulo">
                            <option value="Rio de Janeiro">
                            <option value="Curitiba">
                            <option value="Joinville">
                        </datalist>
                    </div>
                    <div class="mb-4">
                        <label for="cor" class="form-label">Selecione a cor:</label>
                        <input type="color" class="form-control form-control-color" id="cor" value="0000">
                    </div>
                    <div class="mb-4">
                        <label for="opcoes" class="form-label">Selecione uma opcao</label>
                        <select name="opcoes" id="opcoes" class="form-select" >
                            <option value="1">Opcao 1</option>
                            <option value="1">Opcao 2</option>
                            <option value="1">Opcao 3</option>
                            <option value="1">Opcao 4</option>
                            <option value="1">Opcao 5</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="privacidade">
                            <label for="privacidade" class="form-check-label">aceitar termos de privacidade</label>
                        </div>
                    </div>
                    <input type="submit" class="btn btn-primary" value="Cadastrar">
                </form>  
            </div>
        </div>
    </div>
</body>
</html>
